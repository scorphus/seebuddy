version: "2"

sql:
  - engine: postgresql
    queries: backend/lakes/queries.sql
    schema: backend/lakes/migrations
    gen:
      go:
        package: lakes
        out: backend/lakes
        sql_package: pgx/v5
        emit_db_tags: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        output_db_file_name: sqlc.gen.go
        output_models_file_name: sqlc_models.gen.go
        overrides: &go-overrides
          - db_type: text
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: timestamptz
            go_type:
              import: "time"
              type: "Time"
          - db_type: timestamptz
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: int4
            nullable: true
            go_type:
              type: "int32"
              pointer: true
          - db_type: int8
            nullable: true
            go_type:
              type: "int64"
              pointer: true
          - db_type: pg_catalog.numeric
            go_type: "float64"
          - db_type: pg_catalog.numeric
            nullable: true
            go_type:
              type: "float64"
              pointer: true
          - db_type: uuid
            go_type: "string"
          - db_type: uuid
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: jsonb
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: jsonb
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
              pointer: true

  - engine: postgresql
    queries: backend/adapters/wachplan/queries.sql
    schema: backend/adapters/wachplan/migrations
    gen:
      go:
        package: wachplan
        out: backend/adapters/wachplan
        sql_package: pgx/v5
        emit_db_tags: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        output_db_file_name: sqlc.gen.go
        output_models_file_name: sqlc_models.gen.go
        overrides: *go-overrides

  - engine: postgresql
    queries: backend/adapters/openmeteo/queries.sql
    schema: backend/adapters/openmeteo/migrations
    gen:
      go:
        package: openmeteo
        out: backend/adapters/openmeteo
        sql_package: pgx/v5
        emit_db_tags: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        output_db_file_name: sqlc.gen.go
        output_models_file_name: sqlc_models.gen.go
        overrides: *go-overrides

  - engine: postgresql
    queries: backend/adapters/gkd/queries.sql
    schema: backend/adapters/gkd/migrations
    gen:
      go:
        package: gkd
        out: backend/adapters/gkd
        sql_package: pgx/v5
        emit_db_tags: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        output_db_file_name: sqlc.gen.go
        output_models_file_name: sqlc_models.gen.go
        overrides: *go-overrides
